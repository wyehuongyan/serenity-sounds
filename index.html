<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serenity Sounds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <!-- Three.js canvas, always full viewport -->
    <div id="canvas-container"></div>

  <svg width="0" height="0" style="position:absolute">
    <filter id="ink-bleed">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

    <!-- Phase 1: Landing -->
    <div id="phase-landing" class="overlay">
      <div class="brand">
        <h1 class="brand-title">Serenity Sounds</h1>
        <p class="brand-tagline">Transform chaos into calm.</p>
      </div>
      <button id="begin-btn" class="begin-btn">Begin</button>
      <button id="signup-link" class="signup-link">Sign up</button>
    </div>

    <!-- Phase 2: Input -->
    <div id="phase-input" class="overlay hidden">
      <div class="input-wrap">
        <h2 class="mash-header">Let it out</h2>
        <div class="mash-line-container">
          <div id="mash-progress-fill" class="mash-line"></div>
        </div>
        
        <div class="input-controls">
          <p id="keystroke-count" class="keystroke-count">0 / 100</p>
          <button id="upload-btn" class="upload-btn" title="Upload image">
            <svg width="20" height="18" viewBox="0 0 16 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="0.6" y="2.6" width="14.8" height="10.8" rx="1.4" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="5.5" cy="7.5" r="1.8" stroke="currentColor" stroke-width="1.2"/>
              <path d="M0.5 11l3.5-3 3 2.5 2.5-2.5L15 11.5" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <input
          id="mash-input"
          class="mash-input"
          type="text"
          spellcheck="false"
          autocomplete="off"
          aria-label="Mash the keyboard"
        />
        
        <p id="input-hint" class="input-hint">start mashing — droplets catch the letters</p>
        <div id="upload-palette" class="upload-palette hidden">
          <span class="upload-palette-label">palette read</span>
          <div id="upload-palette-swatches" class="upload-palette-swatches"></div>
        </div>
        <button id="generate-btn" class="generate-btn">Generate →</button>
        <input id="image-upload" type="file" accept="image/*" class="hidden" />
      </div>
    </div>

    <!-- Player bar — horizontal pill in center-bottom -->
    <div id="player-bar" class="player-bar hidden">
      <div class="player-wrap">
        <button id="play-pause-btn" class="play-pause-btn" title="Pause/Play">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 6v12l10-6z" />
          </svg>
          <svg id="pause-icon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="5" y="5" width="14" height="14" rx="1" />
          </svg>
        </button>

        <div class="time-display" id="timestamp-current">0:00</div>

        <div class="progress-wrap">
          <div class="progress-track" id="progress-track">
            <div id="progress-fill" class="progress-fill"></div>
            <div id="playhead" class="playhead"></div>
          </div>
        </div>

        <div class="time-display" id="timestamp-total">0:00</div>

        <button id="reset-btn" class="new-btn hidden">New Cluster</button>
      </div>
    </div>

    <!-- History toggle — bottom-left -->
    <button id="history-toggle" class="history-toggle hidden" aria-label="Archive">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="4" y="4" width="6" height="6" rx="1.5" />
        <rect x="14" y="4" width="6" height="6" rx="1.5" />
        <rect x="4" y="14" width="6" height="6" rx="1.5" />
        <rect x="14" y="14" width="6" height="6" rx="1.5" />
      </svg>
    </button>

    <!-- Theme toggle — bottom-left -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Switch Theme">
      <svg id="sun-icon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="12" cy="12" r="5" />
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
      <svg id="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>

    <button id="sound-toggle" class="sound-toggle" aria-label="Mute Sound">
      <svg id="sound-on-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M5 9v6h4l5 4V5L9 9H5z" />
        <path d="M18 9a5 5 0 0 1 0 6" />
        <path d="M20.5 6.5a8.5 8.5 0 0 1 0 11" />
      </svg>
      <svg id="sound-off-icon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M5 9v6h4l5 4V5L9 9H5z" />
        <path d="M18 9l4 6" />
        <path d="M22 9l-4 6" />
      </svg>
    </button>

    <!-- History drawer -->
    <div id="history-drawer" class="history-drawer hidden">
      <header class="history-header">
        <h2 class="history-title">Archive</h2>
        <button id="history-close" class="history-close" aria-label="Close">×</button>
      </header>
      <div id="history-list" class="history-list"></div>
    </div>

    <!-- Sign-up modal -->
    <div id="signup-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div class="modal-content">
        <button id="modal-close" class="modal-close" aria-label="Close">×</button>
        <div class="modal-form">
          <input
            id="signup-email"
            type="email"
            placeholder="your@email.com"
            class="modal-email-input"
            autocomplete="email"
          />
          <button id="signup-submit" class="modal-submit">Submit</button>
        </div>
      </div>
    </div>

    <!-- Stone hover label -->
    <div id="stone-label" class="stone-label"></div>

    <!-- Custom cursor -->
    <div id="cursor-dot" class="cursor-dot"></div>
    <div id="cursor-ring" class="cursor-ring"></div>

    <div class="creator-credit">created by wye huong yan</div>
    <div id="cursor-coords" class="cursor-coords">0.00, 0.00</div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
